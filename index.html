    function getBeijingDate() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const beijing = new Date(utc + (3600000 * 8)); // +8小时
        return {
            year: beijing.getFullYear(),
            month: String(beijing.getMonth() + 1).padStart(2, '0'),
            day: String(beijing.getDate()).padStart(2, '0')
        };
    }

    function updateDateDisplay() {

        {city:"连云港", hall:"浪花音乐吧", time:"午场: 13:30-17:00\n晚场: 19:30-01:00", allow:false, hot:false, remark:"万润商业街天桥二楼", link:"https://surl.amap.com/3wehBF012c3H", status:"营业", price:"20"}
    ];

    const hotCities = ["上海", "苏州", "杭州", "南京", "南通", "嘉兴", "海宁", "常州", "扬州", "无锡", "宁波", "绍兴柯桥"];

    const cityGroups = {
        "C": ["常州"],
        "D": ["丹阳"],
        "H": ["海宁", "海盐", "杭州"],
        "J": ["嘉兴", "江阴", "金华", "句容"],
        "L": ["连云港", "丽水"],
        "N": ["南京", "南通", "宁波"],
        "Q": ["衢州"],
        "S": ["上海", "绍兴柯桥", "苏州"],
        "T": ["台州", "泰州", "桐乡"],
        "W": ["温州", "无锡"],
        "Y": ["盐城", "扬州","扬州宝应", "宜兴", "义乌", "仪征"],
        "Z": ["镇江", "张家港"],
    };

    let currentCity = "";
    let currentFilter = "all";

    function initTailwind() {
        // 热门城市
        document.getElementById("hotCitiesGrid").innerHTML = hotCities.map(city => `
            <button onclick="selectCity('${city}')" 
                    class="neon-btn bg-gradient-to-br from-purple-800 to-pink-800 py-4 rounded-2xl text-center font-medium text-white shadow-lg">
                ${city}
            </button>
        `).join("");

        // 城市列表
        let html = "";
        Object.keys(cityGroups).sort().forEach(letter => {
            html += `
                <div class="mb-6">
                    <div class="text-xl font-bold text-purple-400 mb-3 neon-glow">${letter}</div>
                    <div class="grid grid-cols-2 gap-3">
                        ${cityGroups[letter].map(city => `
                            <button onclick="selectCity('${city}')" 
                                    class="neon-btn bg-gradient-to-br from-purple-900/80 to-pink-900/80 border border-purple-600/50 py-4 px-4 rounded-2xl text-left text-white">
                                ${city}
                            </button>
                        `).join("")}
                    </div>
                </div>
            `;
        });
        document.getElementById("cityList").innerHTML = html;

        // 搜索功能
        document.getElementById("citySearch").addEventListener("input", e => {
            const term = e.target.value.trim().toLowerCase();
            document.querySelectorAll("#cityList button").forEach(btn => {
                btn.style.display = term === "" || btn.textContent.toLowerCase().includes(term) ? "block" : "none";
            });
        });
    }

    function selectCity(city) {
        currentCity = city;
        currentFilter = "all";
        document.getElementById("cityView").classList.add("hidden");
        document.getElementById("hallView").classList.remove("hidden");
        document.getElementById("currentCityTitle").textContent = city;
        updateTabs();
        renderHalls();
    }

    function backToCityView() {
        document.getElementById("hallView").classList.add("hidden");
        document.getElementById("cityView").classList.remove("hidden");
        document.getElementById("hallSearch").value = "";
    }

    function setFilter(filter) {
        currentFilter = filter;
        updateTabs();
        renderHalls();
    }

    function updateTabs() {
        const tabs = {
            all: document.getElementById("tabAll"),
            open: document.getElementById("tabOpen"),
            closed: document.getElementById("tabClosed")
        };
        Object.keys(tabs).forEach(key => {
            const isActive = currentFilter === key;
            tabs[key].classList.toggle("tab-active", isActive);
        });
    }

    function renderHalls(searchFilter = "") {
        const container = document.getElementById("hallList");
        container.innerHTML = "";

        let filtered = venues.filter(v => v.city === currentCity);

        // 置顶逻辑：🐉 或 🔥 的优先
        filtered.sort((a, b) => {
            const scoreA = (a.allow ? 100 : 0) + (a.hot ? 10 : 0);
            const scoreB = (b.allow ? 100 : 0) + (b.hot ? 10 : 0);
            return scoreB - scoreA;
        });

        // 搜索过滤
        if (searchFilter) {
            const term = searchFilter.toLowerCase();
            filtered = filtered.filter(v => 
                v.hall.toLowerCase().includes(term) ||
                v.time.toLowerCase().includes(term) ||
                (v.remark && v.remark.toLowerCase().includes(term))
            );
        }

        // Tab 过滤
        if (currentFilter !== "all") {
            const isOpen = currentFilter === "open";
            filtered = filtered.filter(v => (v.status || "营业") === (isOpen ? "营业" : "停业"));
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-purple-400 text-xl">暂无匹配舞厅</div>`;
            return;
        }

        filtered.forEach(v => {
            const dragon = v.allow ? '<span class="text-2xl">🐉</span>' : '';
            const fire   = v.hot   ? '<span class="text-2xl">🔥</span>' : '';
            const remark = v.remark ? `<div class="mt-3 text-sm text-purple-300 bg-purple-950/50 p-3 rounded-xl">${v.remark}</div>` : '';
            const status = v.status || "营业";
            const statusClass = status === "停业" ? "bg-red-600/80" : "bg-emerald-600/80";
            const priceTag = v.price ? `<div class="mt-2 inline-block bg-blue-600/70 text-white text-xs px-3 py-1 rounded-full">${v.price}</div>` : '';

            const card = `
                <div class="hall-card rounded-3xl overflow-hidden">
                    <div class="p-5">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <div class="text-xl font-bold">${v.hall}</div>
                                <div class="flex gap-2">${dragon}${fire}</div>
                            </div>
                            <div class="${statusClass} px-3 py-1 rounded-full text-sm font-medium">
                                ${status === "营业" ? "营业中" : "暂停"}
                            </div>
                        </div>

                        <div class="mt-4 text-purple-200 whitespace-pre-line text-base leading-relaxed">
                            ${v.time}
                        </div>

                        ${priceTag}
                        ${remark}
                    </div>

                    <div class="bg-black/30 px-5 py-4 border-t border-purple-700/50">
                        <a href="${v.link}" target="_blank" 
                           class="neon-btn block text-center bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-bold text-white">
                            <i class="fa-solid fa-location-dot mr-2"></i> 高德导航
                        </a>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    function filterHalls() {
        renderHalls(document.getElementById("hallSearch").value);
    }

    window.onload = function() {
        initTailwind();
        updateDateDisplay();
    };
</script>
</body>
</html>
