        function getBeijingDate() {
            const formatter = new Intl.DateTimeFormat('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
            const parts = formatter.formatToParts(new Date());
            const year = parts.find(p => p.type === 'year').value;
            const month = parts.find(p => p.type === 'month').value;
            const day = parts.find(p => p.type === 'day').value;
            return { year, month, day };
        }

        const hotCities = ["上海", "苏州", "杭州", "南京", "南通", "嘉兴", "宁波", "常州", "扬州", "义乌", "温州", "绍兴柯桥"];

        const cityGroups = {
            "C": ["常州"],
            "D": ["丹阳"],
            "H": ["海宁", "海盐", "杭州"],
            "J": ["嘉兴", "江阴", "金华", "句容"],
            "L": ["连云港", "丽水"],
            "N": ["南京", "南通", "宁波"],
            "Q": ["衢州"],
            "S": ["上海", "绍兴柯桥", "苏州"],
            "T": ["台州", "泰州", "桐乡"],
            "W": ["温州"],
            "Y": ["盐城", "扬州", "宜兴", "义乌", "仪征"]
        };

        let currentCity = "";
        let currentFilter = "all";

        function initTailwind() {
            const hotGrid = document.getElementById("hotCitiesGrid");
            hotGrid.innerHTML = hotCities.map(city => `
                <button onclick="selectCity('${city}')" class="city-btn bg-white border border-slate-200 hover:border-indigo-300 active:bg-indigo-50 py-4 rounded-3xl text-sm font-semibold text-slate-800 shadow-sm">${city}</button>
            `).join("");

            const cityListEl = document.getElementById("cityList");
            let html = "";
            Object.keys(cityGroups).sort().forEach(letter => {
                html += `
                    <div class="mb-5">
                        <div class="flex items-center gap-3 mb-2 px-1">
                            <span class="text-2xl font-bold text-indigo-600 w-8">${letter}</span>
                            <div class="h-px flex-1 bg-slate-200"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            ${cityGroups[letter].map(city => `
                                <button onclick="selectCity('${city}')" class="city-btn bg-white border border-slate-200 hover:border-violet-300 text-left px-4 py-3.5 rounded-2xl text-base font-medium text-slate-700 flex items-center gap-2">
                                    <span>${city}</span>
                                </button>
                            `).join("")}
                        </div>
                    </div>
                `;
            });
            cityListEl.innerHTML = html;

            document.getElementById("citySearch").addEventListener("input", (e) => {
                const term = e.target.value.trim().toLowerCase();
                document.querySelectorAll("#cityList button").forEach(btn => {
                    btn.style.display = term === "" || btn.textContent.toLowerCase().includes(term) ? "flex" : "none";
                });
            });
        }

        function selectCity(city) {
            currentCity = city;
            currentFilter = "all";
            document.getElementById("cityView").classList.add("hidden");
            document.getElementById("hallView").classList.remove("hidden");
            document.getElementById("currentCityTitle").textContent = city;
            updateTabs();
            renderHalls();
        }

        function backToCityView() {
            document.getElementById("hallView").classList.add("hidden");
            document.getElementById("cityView").classList.remove("hidden");
            document.getElementById("hallSearch").value = "";
        }

        function setFilter(filter) {
            currentFilter = filter;
            updateTabs();
            renderHalls(document.getElementById("hallSearch").value);
        }

        function updateTabs() {
            const tabs = {all: document.getElementById("tabAll"), open: document.getElementById("tabOpen"), closed: document.getElementById("tabClosed")};
            Object.keys(tabs).forEach(key => {
                const active = currentFilter === key;
                tabs[key].classList.toggle("bg-amber-50", active);
                tabs[key].classList.toggle("text-amber-600", active);
                tabs[key].classList.toggle("bg-slate-100", !active);
                tabs[key].classList.toggle("text-slate-600", !active);
            });
        }

        function renderHalls(searchFilter = "") {
            const container = document.getElementById("hallList");
            container.innerHTML = "";

            let filteredVenues = venues
                .filter(v => v.city === currentCity)
                .filter(v => {
                    if (!searchFilter) return true;
                    const t = searchFilter.toLowerCase();
                    return v.hall.toLowerCase().includes(t) || v.time.toLowerCase().includes(t) || (v.remark && v.remark.toLowerCase().includes(t));
                })
                .filter(v => {
                    const s = v.status || "营业";
                    if (currentFilter === "all") return true;
                    if (currentFilter === "open") return s === "营业";
                    if (currentFilter === "closed") return s === "停业";
                    return true;
                });

            if (filteredVenues.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-slate-400"><i class="fa-solid fa-face-frown text-5xl mb-3"></i><p>没有找到匹配的舞厅</p></div>`;
                return;
            }

            filteredVenues.forEach(v => {
                const dragon = v.allow ? `<span class="text-2xl">🐉</span>` : "";
                const fire = v.hot ? `<span class="text-2xl">🔥</span>` : "";
                const remarkHTML = v.remark ? `<div class="mt-3 text-xs bg-amber-50 border border-amber-200 text-amber-700 px-3 py-2 rounded-2xl">${v.remark}</div>` : "";
                const status = v.status || "营业";
                const statusClass = status === "停业" ? "bg-gray-500" : "bg-emerald-500";
                const statusText = status === "停业" ? "暂停营业" : "营业中";
                const cardExtra = status === "停业" ? "opacity-70" : "";
                const priceHTML = v.price ? `<div class="mt-2 text-xs bg-blue-50 text-blue-700 px-3 py-1 rounded-2xl inline-flex items-center"><span class="font-medium">门票：</span>${v.price}</div>` : "";

                const cardHTML = `
                    <div class="hall-card bg-white rounded-3xl overflow-hidden border border-slate-100 ${cardExtra}">
                        <div class="px-5 pt-5 pb-4">
                            <div class="flex justify-between items-start">
                                <div class="flex items-center gap-3">
                                    <div class="text-2xl font-bold text-slate-900">${v.hall}</div>
                                    <div class="flex gap-1">${dragon}${fire}</div>
                                </div>
                                <div class="${statusClass} text-white text-[10px] font-medium px-3 py-1 rounded-2xl flex items-center gap-1">
                                    <i class="fa-solid fa-circle text-[8px]"></i> ${statusText}
                                </div>
                            </div>
                            <div class="mt-4 text-slate-700 text-[15px] leading-relaxed font-medium whitespace-pre-line">${v.time}</div>
                            ${priceHTML}
                            ${remarkHTML}
                        </div>
                        <div class="border-t border-slate-100 bg-slate-50 px-5 py-4">
                            <a href="${v.link}" target="_blank" class="flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-violet-500 text-white font-semibold py-4 rounded-2xl active:scale-95 transition text-base">
                                <i class="fa-solid fa-location-dot"></i> 高德导航
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function filterHalls() {
            renderHalls(document.getElementById("hallSearch").value);
        }

        window.onload = function() {
            initTailwind();
            updateDateDisplay();   // 页面加载时更新北京时间
        };
    </script>
